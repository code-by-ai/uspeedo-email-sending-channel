name: uspeedo-email-sending-channel
description: Send email via the uSpeedo Email API using platform infrastructure rather than the user's mailbox or SMTP server.
version: 1.0.3

author:
  name: uSpeedo
  email: support@uspeedo.com

homepage: https://uspeedo.com
repository: https://github.com/code-by-ai/uspeedo-email-sending-channel
source_url: https://clawhub.ai/code-by-ai/uspeedo-email-sending-channel

license: MIT

tags:
  - email
  - communication
  - api
  - messaging

categories:
  - communication

required_credentials:
  - ACCESSKEY_ID
  - ACCESSKEY_SECRET

# Compatibility aliases for platforms that read env-centric metadata.
required_env_vars:
  - ACCESSKEY_ID
  - ACCESSKEY_SECRET
primary_credential: ACCESSKEY_SECRET

credentials_schema:
  ACCESSKEY_ID:
    type: string
    required: true
    description: uSpeedo API Access Key ID (env or param)

  ACCESSKEY_SECRET:
    type: secret
    required: true
    description: uSpeedo API Access Key Secret (env or param)

security:
  sensitive_credentials: true
  credential_handling: platform_secret_storage
  network_access: https://api.uspeedo.com

provenance:
  vendor: uSpeedo
  homepage: https://uspeedo.com
  repository: https://github.com/code-by-ai/uspeedo-email-sending-channel
  source: https://clawhub.ai/code-by-ai/uspeedo-email-sending-channel

capabilities:
  - send_email

permissions:
  outbound_network: true
  filesystem: none
  system_prompt_access: false

risk_level: low